name: Sync Backend to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v3

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://akshay1306:$HF_TOKEN@huggingface.co/spaces/akshay1306/contractpulse hf-space

      - name: Sync Backend Files (preserve models)
        run: |
          rsync -av --delete \
            --exclude 'model_2/' \
            --exclude 'model_3/' \
            --exclude 'ckpt_obligation_fast/' \
            backend/ hf-space/

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space

          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"

          # 🔥 THIS IS THE KEY FIX
          git remote remove origin
          git remote add origin https://akshay1306:$HF_TOKEN@huggingface.co/spaces/akshay1306/contractpulse

          git pull origin main --rebase

          git add .
          git commit -m "Sync backend code" || echo "No changes"

          git push origin main